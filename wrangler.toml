# ── Cloudflare Pages configuration ───────────────────────────
# Name used when creating the Pages project.
# Change to your desired project name (dashboard or --project-name flag).
# name = "protome"

compatibility_date = "2025-06-01"

# Environment variables — set these in the Cloudflare dashboard
# under Pages > your-project > Settings > Environment variables.
#
# Production:
#   SUPABASE_URL    = https://xxxxxxxxxxxx.supabase.co
#   SUPABASE_ANON_KEY = eyJhbGciOiJIUzI1NiIs...
#
# Preview (for branch deploys):
#   Same vars, or use your dev Supabase instance.
#
# Local dev (wrangler pages dev):
#   These vars must be set at the TOP level of wrangler.toml
#   (not under [env.production]) for wrangler pages dev to pick
#   them up without the --env flag. Fill in your Supabase values:
# vars = { SUPABASE_URL = "https://xxxxxxxxxxxx.supabase.co", SUPABASE_ANON_KEY = "eyJhbGci..." }

[env.production]
vars = { SUPABASE_URL = "", SUPABASE_ANON_KEY = "" }

[env.preview]
vars = { SUPABASE_URL = "", SUPABASE_ANON_KEY = "" }

# ── Deploy command ─────────────────────────────────────────
# npx wrangler pages deploy dist/ --branch main
#
# Or with project name:
# npx wrangler pages deploy dist/ --project-name protome --branch main
#
# First time: run without --branch to create the project:
# npx wrangler pages project create protome
# npx wrangler pages deploy dist/ --branch main

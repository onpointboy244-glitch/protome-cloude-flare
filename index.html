<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/logo-og.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Protome turns your raw information into a beautifully designed protofile. Clean, designed, yours." />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="google-site-verification" content="Q2M89yUz_wFcWT_xMucfth7Cd8TV4F8eYS7b2br6k4E" />
    <link rel="canonical" href="https://protome.pages.dev/" />
    <title>protome — beautifully resolved profiles</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload font CSS as non-blocking — text renders in fallback fonts first, swaps when loaded -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Spectral:wght@400;500;600;700&family=Outfit:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Caveat:wght@400;600;700&family=Bebas+Neue&family=Fredoka:wght@400;500;600;700&display=swap" onload="this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Spectral:wght@400;500;600;700&family=Outfit:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Caveat:wght@400;600;700&family=Bebas+Neue&family=Fredoka:wght@400;500;600;700&display=swap" /></noscript>
    <style>
      /* Initial loading spinner — visible before React mounts */
      .shell-spinner {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #fff; z-index: 9999; transition: opacity 0.2s;
      }
      .shell-spinner__ring {
        width: 28px; height: 28px; border: 2px solid oklch(0.9 0.004 35); border-top-color: oklch(0.42 0.14 35.8);
        border-radius: 50%; animation: shell-spin 0.8s linear infinite;
      }
      @keyframes shell-spin { to { transform: rotate(360deg) } }
    </style>
  </head>
  <body>
    <script>if(location.hash&&(location.hash.includes('type=signup')||location.hash.includes('access_token')))localStorage.setItem('email_confirmed','1')</script>
    <div id="root">
      <div class="shell-spinner" id="shell-spinner">
        <div class="shell-spinner__ring"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
